name: flutter_application_1
description: "Findex - Personal Finance Tracker"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0
  fl_chart: ^0.68.0
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  firebase_database: ^11.1.0
  flutter_local_notifications: ^18.0.0
  http: ^1.2.0
  shared_preferences: ^2.2.3
  google_sign_in: ^6.2.1
  url_launcher: ^6.3.0
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  web:
    generate: true
    image_path: "assets/images/app_icon.png"
    background_color: "#0F1628"
    theme_color: "#8B6AFF"

flutter:
  uses-material-design: true
  assets:
    - assets/images/